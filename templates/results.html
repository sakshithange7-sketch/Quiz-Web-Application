{% extends 'base.html' %}

{% block content %}

<h2>Quiz Results</h2>

<table>

<tr>
    <th>ID</th>
    <th>Selected Answer</th>
    <th>Correct</th>
</tr>

{% for r in results %}

<tr>
    <td>{{ r.id }}</td>
    <td>{{ r.selected_answer }}</td>
    <td>
        {% if r.is_correct %}
            ✅ Correct
        {% else %}
            ❌ Wrong
        {% endif %}
    </td>
</tr>

{% endfor %}

</table>

{% endblock %}
