<table border="1">
<tr>
    <th>ID</th>
    <th>Answer</th>
    <th>Status</th>
</tr>

{% for r in results %}
<tr>
    <td>{{ r.id }}</td>
    <td>{{ r.selected_answer }}</td>

    {% if r.is_correct %}
        <td style="color: green;">Correct</td>
    {% else %}
        <td style="color: red;">Wrong</td>
    {% endif %}
</tr>
{% endfor %}
</table>
