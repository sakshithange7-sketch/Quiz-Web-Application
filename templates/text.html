{% extends 'base.html' %}

{% block content %}

<h2>Text Question Form</h2>

<form method="POST" onsubmit="return validateTextForm()">

    {{ form.hidden_tag() }}

    <label for="textInput">
        Enter Your Answer
    </label>

    {{ form.question(id="textInput", placeholder="Type your answer here...") }}

    {{ form.submit(class="btn") }}

</form>

<script>

function validateTextForm(){

    let text = document.getElementById("textInput").value;

    if(text.trim() === ""){

        alert("Please enter your answer.");
        return false;
    }

    return true;
}

</script>

{% endblock %}
