<!DOCTYPE html>
<html>
<head>
    <title>MCQ Question</title>
</head>
<body>

<h2>MCQ Question</h2>

<form method="POST">
    {{ form.hidden_tag() }}

    <p>{{ form.answer.label }}</p>

    {% for option in form.answer %}
        <p>
            {{ option() }}
            {{ option.label.text }}
        </p>
    {% endfor %}

    <p>{{ form.submit() }}</p>
</form>

</body>
</html>
