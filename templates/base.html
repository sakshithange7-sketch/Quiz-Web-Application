<!DOCTYPE html>
<html>
<head>
    <title>Quiz Application</title>

    <style>

        body{
            font-family: Arial;
            background: #f4f6f9;
            margin:0;
            padding:0;
        }

        .container{
            width:60%;
            margin:auto;
            margin-top:50px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        h1,h2{
            text-align:center;
            color:#333;
        }

        input[type=text]{
            width:100%;
            padding:10px;
            margin-top:10px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        .btn{
            background:#007bff;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:5px;
            cursor:pointer;
            margin-top:20px;
        }

        .btn:hover{
            background:#0056b3;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
        }

        table, th, td{
            border:1px solid #ccc;
        }

        th, td{
            padding:12px;
            text-align:center;
        }

        th{
            background:#007bff;
            color:white;
        }

        .success{
            color:green;
            font-weight:bold;
            text-align:center;
        }

        .timer{
            text-align:right;
            color:red;
            font-size:18px;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="container">

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
