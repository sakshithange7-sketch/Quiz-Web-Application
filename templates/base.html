<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quiz Application</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .container{
            width:100%;
            max-width:700px;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        h1, h2{
            text-align:center;
            margin-bottom:25px;
            color:#333;
        }

        form{
            margin-top:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
            color:#444;
        }

        input[type="text"]{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            margin-bottom:20px;
            font-size:16px;
        }

        input[type="radio"]{
            margin-right:10px;
            margin-top:10px;
        }

        .option{
            margin-bottom:10px;
            font-size:17px;
        }

        .btn{
            width:100%;
            padding:12px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        .btn:hover{
            background:#0056b3;
        }

        .btn:focus,
        input:focus{
            outline:3px solid #ff9800;
        }

        .timer{
            text-align:right;
            color:red;
            font-size:18px;
            font-weight:bold;
            margin-bottom:20px;
        }

        .success{
            text-align:center;
            color:green;
            font-size:20px;
            margin-top:20px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
        }

        table th{
            background:#007bff;
            color:white;
            padding:12px;
        }

        table td{
            border:1px solid #ddd;
            padding:12px;
            text-align:center;
        }

        tr:nth-child(even){
            background:#f2f2f2;
        }

        @media(max-width:768px){

            .container{
                padding:20px;
            }

            h1,h2{
                font-size:24px;
            }

            .btn{
                font-size:16px;
            }

        }

    </style>

</head>

<body>

    <div class="container">

        {% block content %}
        {% endblock %}

    </div>

</body>
</html>
